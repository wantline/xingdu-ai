<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星嘟 AI 预约</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 393px; margin: 0 auto; background: #fff; min-height: 100vh; }
        .header { height: 44px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #f0f0f0; }
        .header-title { font-size: 17px; font-weight: 600; color: #000; }
        .header-share { font-size: 14px; color: #000; opacity: 0.8; }
        .chat-container { padding: 16px; min-height: calc(100vh - 180px); }
        .message { display: flex; margin-bottom: 16px; align-items: flex-start; gap: 12px; }
        .message.ai { flex-direction: row; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .message-bubble { max-width: 70%; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.5; }
        .message.ai .message-bubble { background: #f5f5f5; color: #000; border-bottom-left-radius: 4px; }
        .message.user .message-bubble { background: #07c160; color: #fff; border-bottom-right-radius: 4px; }
        .chips-wrapper { position: fixed; bottom: 76px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 393px; background: #fff; border-top: 1px solid #f0f0f0; padding: 12px 16px; }
        .chips-container { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .chips-container::-webkit-scrollbar { display: none; }
        .chip { padding: 8px 16px; background: #f5f5f5; color: #000; border-radius: 18px; font-size: 14px; white-space: nowrap; cursor: pointer; border: 1px solid #e5e5e5; transition: all 0.2s; }
        .chip:active { background: #e5e5e5; transform: scale(0.98); }
        .input-area { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 393px; background: #fff; border-top: 1px solid #f0f0f0; padding: 12px 16px; display: flex; align-items: center; gap: 12px; height: 76px; }
        .input-field { flex: 1; height: 40px; border: 1px solid #e5e5e5; background: #f5f5f5; border-radius: 20px; padding: 0 16px; font-size: 15px; outline: none; }
        .input-field::placeholder { color: #999; }
        .send-btn { height: 40px; background: #07c160; color: #fff; border: none; border-radius: 20px; padding: 0 20px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .send-btn:active { opacity: 0.8; transform: scale(0.98); }
        .role-switcher { position: fixed; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.6); color: #fff; padding: 6px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; border: none; }
        .page { display: none; }
        .page.active { display: block; }
        .merchant-header { height: 44px; background: #0052d9; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .merchant-title { font-size: 17px; font-weight: 600; color: #fff; }
        .stats-grid { padding: 16px; background: #f5f5f5; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-card { background: #fff; padding: 16px; border-radius: 12px; }
        .stat-label { color: #999; font-size: 12px; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #000; }
        .section { padding: 16px; }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        .order-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .order-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .order-name { font-size: 15px; font-weight: 500; }
        .order-status { font-size: 12px; padding: 4px 8px; border-radius: 4px; background: #fef0e6; color: #ed7b2f; }
        .order-info { font-size: 13px; color: #666; margin-bottom: 4px; }
        .order-actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
        .btn-default { background: #f5f5f5; color: #000; }
        .btn-primary { background: #07c160; color: #fff; }
    </style>
</head>
<body>
    <button class="role-switcher" onclick="toggleRole()">🔄 切换</button>

    <!-- 用户端 - AI 对话页 -->
    <div id="page-chat" class="page active container">
        <div class="header">
            <div class="header-title">星嘟 AI 预约</div>
            <div class="header-share">分享</div>
        </div>
        <div class="chat-container" id="chatContainer">
            <div class="message ai">
                <div class="avatar">🤖</div>
                <div class="message-bubble">您好，这里是星嘟 AI 预约餐厅！😊</div>
            </div>
        </div>
        <div class="chips-wrapper">
            <div class="chips-container">
                <button class="chip" onclick="sendChip('预约')">预约</button>
                <button class="chip" onclick="sendChip('菜单')">菜单</button>
                <button class="chip" onclick="sendChip('查询订单')">查询订单</button>
            </div>
        </div>
        <div class="input-area">
            <input type="text" class="input-field" id="messageInput" placeholder="输入消息..." oninput="updateSendBtn()">
            <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <!-- 商家端 - Dashboard -->
    <div id="page-merchant" class="page container">
        <div class="merchant-header">
            <div class="merchant-title">商家管理</div>
            <div style="color: #fff; font-size: 14px;" onclick="switchPage('page-chat')">👤</div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">今日预约</div><div class="stat-value">24</div></div>
            <div class="stat-card"><div class="stat-label">待确认</div><div class="stat-value" style="color: #ed7b2f;">5</div></div>
            <div class="stat-card"><div class="stat-label">充值收入</div><div class="stat-value" style="color: #07c160; font-size: 20px;">¥3,280</div></div>
            <div class="stat-card"><div class="stat-label">待消费负债</div><div class="stat-value" style="color: #d4af37; font-size: 20px;">¥12,560</div></div>
        </div>
        <div class="section">
            <div class="section-title">新预约通知</div>
            <div class="order-card">
                <div class="order-row">
                    <div class="order-name">Wang</div>
                    <div class="order-status">待确认</div>
                </div>
                <div class="order-info">📅 2024-04-06 18:30（晚餐）</div>
                <div class="order-info">👥 4 人 · 🍽️ 套餐 B x1</div>
                <div class="order-info">💰 已付定金 ¥50.00</div>
                <div class="order-actions">
                    <button class="btn btn-default">拒绝</button>
                    <button class="btn btn-primary" onclick="alert('✅ 已确认留位！')">确认留位</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            addMessage(message, 'user');
            input.value = '';
            setTimeout(() => { addMessage(getAIReply(message), 'ai'); }, 1000);
        }
        function sendChip(text) {
            addMessage(text, 'user');
            setTimeout(() => { addMessage(getAIReply(text), 'ai'); }, 1000);
        }
        function addMessage(text, type) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            const avatar = type === 'ai' ? '<div class="avatar">🤖</div>' : '';
            messageDiv.innerHTML = `${avatar}<div class="message-bubble">${text}</div>`;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        function updateSendBtn() {}
        function getAIReply(message) {
            const replies = {
                '预约': '好的，请问您想预约什么时间？几位用餐呢？',
                '菜单': '这是我们的精选菜单：\n🍽️ 套餐 A：¥198/2 位\n🍽️ 套餐 B：¥298/4 位\n🍽️ 套餐 C：¥498/6 位',
                '查询订单': '您有 2 条历史预约，最近的是明天 18:30，4 位，套餐 B。'
            };
            return replies[message] || '好的，我明白了～';
        }
        function toggleRole() {
            const btn = document.querySelector('.role-switcher');
            if (currentRole === 'user') {
                currentRole = 'merchant';
                btn.innerHTML = '👤 用户';
                switchPage('page-merchant');
            } else {
                currentRole = 'user';
                btn.innerHTML = '🔄 切换';
                switchPage('page-chat');
            }
        }
        let currentRole = 'user';
        document.getElementById('messageInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
